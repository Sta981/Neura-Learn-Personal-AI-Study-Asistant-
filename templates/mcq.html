<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Generator — NeuraLearn</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="logo">Neura<span>Learn</span></a>
  <a href="/explain">Explainer</a>
  <a href="/mcq" class="active">MCQ Gen</a>
  <a href="/summarize">Summarizer</a>
  <a href="/quiz">Quiz Mode</a>
</nav>

<div class="page">
  <div class="page-header">
    <span class="tag" style="color: var(--accent2);">Feature 02</span>
    <h1>MCQ Generator</h1>
    <p>Generate practice questions on any topic for your exam preparation.</p>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Topic</label>
          <input type="text" name="topic" placeholder="e.g. Object Oriented Programming..." value="{{ topic }}" required>
        </div>
        <div class="form-group">
          <label>Number of Questions</label>
          <select name="num">
            <option value="3">3 Questions</option>
            <option value="5" selected>5 Questions</option>
            <option value="10">10 Questions</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn purple">Generate MCQs</button>
    </form>
  </div>

  {% if result %}
  <div class="result-box" style="border-left-color: var(--accent2);">
    <div class="result-label" style="color: var(--accent2);">Generated Questions</div>
    <div class="result-content">{{ result }}</div>
  </div>
  {% endif %}
</div>

</body>
</html>
