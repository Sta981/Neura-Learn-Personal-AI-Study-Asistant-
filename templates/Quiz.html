<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Mode — NeuraLearn</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="logo">Neura<span>Learn</span></a>
  <a href="/explain">Explainer</a>
  <a href="/mcq">MCQ Gen</a>
  <a href="/summarize">Summarizer</a>
  <a href="/quiz" class="active">Quiz Mode</a>
</nav>

<div class="page">
  <div class="page-header">
    <span class="tag" style="color: var(--green);">Feature 04</span>
    <h1>Quiz Mode</h1>
    <p>Test your knowledge with an AI-generated scored quiz. See how much you really know!</p>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <div class="quiz-setup">
      <h2>Start a New Quiz</h2>
      <div class="form-group">
        <label>Topic</label>
        <input type="text" id="quiz-topic" placeholder="e.g. Python OOP, Linear Algebra...">
      </div>
      <div class="form-group">
        <label>Number of Questions</label>
        <select id="quiz-num">
          <option value="3">3 Questions (Quick)</option>
          <option value="5" selected>5 Questions (Normal)</option>
          <option value="10">10 Questions (Full)</option>
        </select>
      </div>
      <button class="btn" style="width:100%; justify-content:center; background: var(--green); color: #080b12;"
              onclick="startQuiz()">Start Quiz</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Generating your quiz...</p>
  </div>

  <!-- Quiz Arena -->
  <div id="quiz-arena">
    <div class="quiz-progress">
      <span id="q-counter">Question 1 of 5</span>
      <span id="q-score-live">Score: 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
      <div class="options-grid" id="options-grid"></div>
    </div>
    <button class="btn" id="next-btn" style="display:none; margin-top: 0.5rem;"
            onclick="nextQuestion()">Next →</button>
  </div>

  <!-- Score Screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-circle">
      <div class="score-num" id="final-score">0</div>
      <div class="score-den" id="final-total">/ 5</div>
    </div>
    <h2 id="score-title">Quiz Complete!</h2>
    <p id="score-msg">Here's how you did:</p>
    <div class="score-breakdown">
      <div class="score-stat">
        <div class="val" id="stat-correct" style="color: var(--green);">0</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="score-stat">
        <div class="val" id="stat-wrong" style="color: var(--red);">0</div>
        <div class="lbl">Wrong</div>
      </div>
      <div class="score-stat">
        <div class="val" id="stat-pct" style="color: var(--accent);">0%</div>
        <div class="lbl">Score</div>
      </div>
    </div>
    <button class="btn" onclick="resetQuiz()" style="background: var(--green); color: #080b12;">
      Try Another Quiz
    </button>
  </div>
</div>

<script>
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  async function startQuiz() {
    const topic = document.getElementById('quiz-topic').value.trim();
    const num = document.getElementById('quiz-num').value;

    if (!topic) {
      document.getElementById('quiz-topic').focus();
      return;
    }

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    const res = await fetch('/quiz/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, num: parseInt(num) })
    });

    const data = await res.json();
    document.getElementById('loading').style.display = 'none';

    if (!data.success) {
      alert('Error: ' + data.error);
      document.getElementById('setup-screen').style.display = 'block';
      return;
    }

    questions = data.questions;
    current = 0;
    score = 0;
    document.getElementById('quiz-arena').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    const total = questions.length;
    const labels = ['A', 'B', 'C', 'D'];

    document.getElementById('q-counter').textContent = `Question ${current + 1} of ${total}`;
    document.getElementById('q-score-live').textContent = `Score: ${score}`;
    document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('next-btn').style.display = 'none';

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.disabled = false;
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span>${opt}`;
      btn.onclick = () => selectAnswer(i, q.answer);
      grid.appendChild(btn);
    });
  }

  function selectAnswer(chosen, correct) {
    if (answered) return;
    answered = true;

    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    if (chosen === correct) {
      btns[chosen].classList.add('correct');
      score++;
    } else {
      btns[chosen].classList.add('wrong');
      btns[correct].classList.add('correct');
    }

    document.getElementById('q-score-live').textContent = `Score: ${score}`;
    document.getElementById('next-btn').style.display = 'inline-flex';
    document.getElementById('next-btn').textContent =
      current + 1 < questions.length ? 'Next →' : 'See Results 🏆';
  }

  function nextQuestion() {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showScore();
    }
  }

  function showScore() {
    document.getElementById('quiz-arena').style.display = 'none';
    const screen = document.getElementById('score-screen');
    screen.style.display = 'block';

    const total = questions.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById('final-score').textContent = score;
    document.getElementById('final-total').textContent = `/ ${total}`;
    document.getElementById('stat-correct').textContent = score;
    document.getElementById('stat-wrong').textContent = total - score;
    document.getElementById('stat-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = '100%';

    const titles = {
      90: ['🏆 Excellent!', "You really know your stuff!"],
      70: ['✅ Good Job!', "Solid performance. Keep it up!"],
      50: ['📚 Keep Studying', "You're getting there — review the topic."],
      0:  ['💪 Don\'t Give Up', "Revise the topic and try again!"]
    };

    const grade = pct >= 90 ? 90 : pct >= 70 ? 70 : pct >= 50 ? 50 : 0;
    document.getElementById('score-title').textContent = titles[grade][0];
    document.getElementById('score-msg').textContent = titles[grade][1];
  }

  function resetQuiz() {
    document.getElementById('score-screen').style.display = 'none';
    document.getElementById('quiz-topic').value = '';
    document.getElementById('setup-screen').style.display = 'block';
    document.getElementById('progress-fill').style.width = '0%';
  }
</script>

</body>
</html>
