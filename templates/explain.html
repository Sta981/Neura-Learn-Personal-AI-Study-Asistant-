<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Explainer — NeuraLearn</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="logo">Neura<span>Learn</span></a>
  <a href="/explain" class="active">Explainer</a>
  <a href="/mcq">MCQ Gen</a>
  <a href="/summarize">Summarizer</a>
  <a href="/quiz">Quiz Mode</a>
</nav>

<div class="page">
  <div class="page-header">
    <span class="tag" style="color: var(--accent);">Feature 01</span>
    <h1>Topic Explainer</h1>
    <p>Enter any topic and get a simple, example-based explanation tailored to your level.</p>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Topic</label>
          <input type="text" name="topic" placeholder="e.g. Recursion, Neural Networks..." value="{{ topic }}" required>
        </div>
        <div class="form-group">
          <label>Level</label>
          <select name="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn">Explain it</button>
    </form>
  </div>

  {% if result %}
  <div class="result-box">
    <div class="result-label" style="color: var(--accent);">AI Explanation</div>
    <div class="result-content">{{ result }}</div>
  </div>
  {% endif %}
</div>

</body>
</html>
